server {
    listen 80;
    server_name vifcpass.com www.vifcpass.com dashboard.vifcpass.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vifcpass.com www.vifcpass.com dashboard.vifcpass.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/vifcpass.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vifcpass.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Client limits
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # DNS Resolver for Docker
    resolver 127.0.0.11 valid=10s;

    # API and Modules proxy
    location ~ ^/(api|auth|users|cms|subscriptions|payments|rbac|analytics|health|swagger)/ {
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Storage proxy
    location /storage/ {
        set $storage_upstream http://nginx-storage:80;
        proxy_pass $storage_upstream/storage/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React App Routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
